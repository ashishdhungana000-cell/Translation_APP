<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Translator | EN-FI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container">
        <header>
            <h1>Voice Translator</h1>
            <p>Listen and translate instantly</p>
        </header>

        <section class="translator-card">
            <div class="controls">
                <div class="toggle-container">
                    <span class="lang-label">English</span>
                    <label class="switch">
                        <input type="checkbox" id="language-toggle">
                        <span class="slider round"></span>
                    </label>
                    <span class="lang-label">Finnish</span>
                </div>
                
                <div class="mode-indicator">
                    <span id="current-mode">English to Finnish</span>
                </div>
            </div>

            <div class="text-areas">
                <div class="input-group">
                    <label for="input-text">Voice Input</label>
                    <div id="input-text" class="text-display" placeholder="Speak something..."></div>
                </div>
                <div class="output-group">
                    <label for="output-text">Translation</label>
                    <div id="output-text" class="text-display result" placeholder="Translation will appear here..."></div>
                </div>
            </div>

            <div class="actions">
                <button id="listen-btn" class="btn-primary">
                    <span class="icon">🎤</span>
                    <span class="btn-text">Start Listening</span>
                </button>
                <div id="listening-indicator" class="hidden">
                    <div class="pulse"></div>
                    <span>Listening...</span>
                </div>
            </div>
        </section>

        <footer>
            <p>Powered by Web Speech API & MyMemory</p>
        </footer>
    </main>

    <script src="app.js"></script>
</body>
</html>
